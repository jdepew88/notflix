services:
  notflix:
    container_name: notflix
    build: .
    restart: unless-stopped
    ports:
      - "3233:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # PLEX_URL + PLEX_TOKEN: set in .env (use your LAN IP, e.g. http://172.16.x.x:32400)
      LIBRARY_PATH: /media/Video
      DATA_PATH: /app/data
    volumes:
      - /mnt/user/Media:/media:ro
      - /mnt/user/appdata/notflix/data:/app/data
    # Uncomment for Traefik (adjust network/labels to match your stack):
    # networks:
    #   - traefik
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.notflix.rule=Host(`notflix.jrtech.com`)
    #   - traefik.http.routers.notflix.entrypoints=websecure
    #   - traefik.http.routers.notflix.tls=true
    #   - traefik.http.routers.notflix.tls.certresolver=letsencrypt
    #   - traefik.http.services.notflix.loadbalancer.server.port=3000

